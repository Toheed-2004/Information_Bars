# ============================================================================
# bitpredict — BARS DATA CONFIGURATION
# ============================================================================
#
# PURPOSE
# -------
# This file defines bar collection settings for each exchange and symbol.
# These settings determine which bar types (dollar, volatility, volume)
# are collected for each symbol at various timeframes.
#
# It is parsed by a Python ingestion script to populate ONE table:
#
#   meta.custom_bars
#
# Table shape:
#   id | exchange | symbol  | bars (JSONB)
#
# This file is READ-ONLY in production.
# Any change here alters system-wide bar data collection.
# ============================================================================

project:
  name: bitpredict
  environment: production
  version: "1.0.0"
  timezone: UTC

# ---------------------------------------------------------------------------
# BARS DATA DEFINITIONS
# ---------------------------------------------------------------------------
#
# STRUCTURE OVERVIEW
# ------------------
# exchanges
# └── exchange
#     └── symbols
#         └── symbol
#             └── bars          -> Bar types dictionary
#                 ├── dollar      -> Dollar bars (true/false)
#                 ├── volatility  -> Volatility bars (true/false)
#                 ├── volume      -> Volume bars (true/false)
#                 ├── range       -> Range bars (true/false)
#                 ├── renko       -> Renko bars (true/false)
#                 └── hybrid      -> Hybrid bars (true/false)
#
# CONTROL MECHANISM
# -----------------
# Control is at the symbol level via the 'enabled' flag.
# Set enabled: false to disable a symbol without deleting its config.
#
# Bars are stored as JSONB in the database, one row per symbol.
# No row explosion occurs.
#
# BAR TYPES
# ---------
# 1. DOLLAR BARS:
#    - Created when a predefined dollar amount is traded.
#    - Example: 1,000,000 USD traded = 1 dollar bar.
#    - Useful for normalizing across different price levels.
#
# 2. VOLATILITY BARS:
#    - Created when the price moves by a specified percentage.
#    - Example: 0.5% price movement = 1 volatility bar.
#    - Captures market regimes and volatility clustering.
#
# 3. VOLUME BARS:
#    - Created when a predefined volume is traded.
#    - Example: 100 BTC traded = 1 volume bar.
#    - Captures liquidity and market depth.
#
# 4. RANGE BARS:
#    - Created when price moves by a fixed range amount, ignoring time.
#    - Useful for measuring pure price movement.
#
# 5. RENKO BARS:
#    - Bricks built based on price movement, ignoring time.
#    - Example: each brick represents a $50 price change.
#    - Filters out market noise, focuses on trend direction.
#
# 6. HYBRID BARS:
#    - Combine multiple criteria (volume, volatility, time) to form bars.
#    - Example: create a bar when either volume threshold or time interval is reached.
#    - Provides adaptive bar formation for multi-dimensional market events.
#
# Each bar type can be enabled/disabled independently per symbol.
# ---------------------------------------------------------------------------

