# ============================================================================
# BAR TYPE CONFIGURATION DETAILS
# ============================================================================
#
# Note: The actual parameters for each bar type (dollar amount,
# volatility threshold, volume threshold) are configured in the
# data collection system, not in this metadata file.
#
# This file only controls WHICH bar types are collected for each symbol.
#
# For example:
# - Dollar bars might be configured as: $1M, $5M, $10M thresholds
# - Volatility bars might be: 0.1%, 0.5%, 1.0% thresholds
# - Volume bars might be: 10 BTC, 50 BTC, 100 BTC thresholds
#
# These thresholds are set in the bar generation pipeline configuration.
# ============================================================================
