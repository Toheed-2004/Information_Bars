# ============================================================================
# bitpredict — META SYMBOL REGISTRY
# ============================================================================
#
# PURPOSE
# -------
# This file defines ALL tradable symbols supported by the system and the
# time resolutions (bars) available for each symbol.
#
# It is parsed by a Python ingestion script to populate ONE table:
#
#   meta.symbols
#
# Table shape:
#   id | exchange | symbol | enabled | bars | timeframes (JSONB)
#
# This file is READ-ONLY in production.
# Any change here alters system-wide ingestion, resampling, and signals.
# ============================================================================

project:
  name: bitpredict
  environment: production
  version: "1.0.0"
  timezone: UTC

# ---------------------------------------------------------------------------
# SYMBOL DEFINITIONS
# ---------------------------------------------------------------------------
#
# STRUCTURE OVERVIEW
# ------------------
# exchanges
# └── exchange
#     └── symbols
#         └── symbol
#             ├── enabled       -> Per-symbol control (boolean)
#             ├── bars          -> Trading pairs dictionary (e.g., {usd: false})
#             └── timeframes -> Available timeframes dictionary (e.g., {})
#
# CONTROL MECHANISM
# -----------------
# Control is at the symbol level only via the 'enabled' flag.
# Set  to disable a symbol without deleting its config.
#
# timeframes and bars are stored AS-IS into the database as JSONB.
# No row explosion. One symbol = one DB row.
#
# TIME HORIZON NOTATION
# ---------------------
# Valid suffixes: m (minutes), h (hours), d (days), w (weeks), M (months)
# Examples:
#   1m  -> 1 minute bars
#   15m -> 15 minute bars
#   1h  -> 1 hour bars
#   4h  -> 4 hour bars
#   1d  -> 1 day bars
#
# Set to false to disable a specific timeframe without removing it.
# ---------------------------------------------------------------------------

