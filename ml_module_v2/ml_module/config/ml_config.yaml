# =============================================================================
# ml_config.yaml
# =============================================================================
#
# Research question:
#   Do information bars built from tick-level data produce better directional
#   ML signals than the same bar types built from minute-level OHLCV data?
#
#   Tier 1 (baseline): calendar bars    — OHLCV only (no microstructure)
#   Tier 2:            minute-source    — OHLCV + vwap + tick_count + duration
#   Tier 3:            tick-source      — Tier 2 + buy_sell_imbalance (order flow)
#
# Each bar type uses ALL its naturally available columns.
# =============================================================================

output_dir: "ml_module_v2/outputs"
min_bars:   150

# ---------------------------------------------------------------------------
# Data
# ---------------------------------------------------------------------------
data:
  asset:         "btc"
  datetime_col:  "datetime"
  bar_data_dir:  "data/processed_bars"

  bar_files:
    # Tier 2 — minute-source information bars
    dollar_1m:      "1minute_dollar_bars.csv"
    volume_1m:      "1minute_volume_bars.csv"
    volatility_1m:  "1minute_volatility_bars.csv"
    hybrid_1m:      "1minute_hybrid_bars.csv"
    range_1m:       "1minute_range_bars.csv"
    renko_1m:       "1minute_renko_bars.csv"

    # Tier 3 — tick-source information bars
    dollar_tick:     "binance_btc_dollar_tick_bars.csv"
    volume_tick:     "binance_btc_volume_tick_bars.csv"
    volatility_tick: "binance_btc_volatility_tick_bars.csv"
    hybrid_tick:     "binance_btc_hybrid_tick_bars.csv"
    range_tick:      "binance_btc_range_tick_bars.csv"
    renko_tick:      "binance_btc_renko_tick_bars.csv"

    # Tier 1 — calendar baseline (OHLCV only by nature)
    # time_1h:  "binance_btc_1h.csv"
    # time_4h:  "binance_btc_4h.csv"

# ---------------------------------------------------------------------------
# Labeling (Triple-Barrier)
# ---------------------------------------------------------------------------
labeling:
  profit_target:      2.0    # upper barrier = close × (1 + σ × 2.0)
  stop_loss:          1.5    # lower barrier = close × (1 - σ × 1.5)
  max_holding_bars:   10     # vertical barrier
  vol_lookback:       10     # rolling σ window

# ---------------------------------------------------------------------------
# Fractional Differencing
# ---------------------------------------------------------------------------
fractional_diff:
  d_min:   0.1
  d_max:   1.0
  d_step:  0.1
  adf_sig: 0.05

# ---------------------------------------------------------------------------
# Walk-Forward Validation
# ---------------------------------------------------------------------------
walk_forward:
  initial_train_bars:    200
  step_bars:             100
  min_test_bars:          20
  embargo_bars:            5
  confidence_threshold:  0.60   # filter signals below 60% confidence

# ---------------------------------------------------------------------------
# Model — single LightGBM
# ---------------------------------------------------------------------------
model:
  params:
    n_estimators:       500
    learning_rate:      0.02
    num_leaves:          31
    min_child_samples:   20
    subsample:           0.8
    colsample_bytree:    0.8
    reg_alpha:           0.1
    reg_lambda:          1.0
    random_state:         42
    n_jobs:               -1
